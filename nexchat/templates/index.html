<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexChat</title>
  {% load static %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --card: #161b22;
      --panel: #0d1117;
      --border: #30363d;
      --t: #c9d1d9;
      --tm: #8b949e;
      --tb: #f0f6fc;
      --green: #3fb950;
      --blue: #58a6ff;
      --red: #f85149;
      --yellow: #d29922;
      --purple: #bc8cff;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--t); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    /*  Layout  */
    .layout { display: flex; height: 100vh; }

    /*  Sidebar  */
    .sidebar { width: 260px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-head h2 { color: var(--tb); font-size: 15px; font-weight: 700; }
    .sidebar-head .me { color: var(--tm); font-size: 11px; font-family: monospace; }
    .sidebar-section { padding: 10px 10px 4px; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-section span { color: var(--tm); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .icon-btn { background: none; border: none; color: var(--tm); cursor: pointer; font-size: 18px; line-height: 1; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
    .icon-btn:hover { background: var(--border); color: var(--tb); }
    .room-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .room-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; transition: background .1s; }
    .room-item:hover  { background: rgba(88,166,255,.08); }
    .room-item.active { background: rgba(88,166,255,.15); }
    .room-item .ri-icon { font-size: 14px; flex-shrink: 0; }
    .room-item .ri-name { font-size: 13px; color: var(--tb); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .room-item .ri-type { font-size: 9px; color: var(--tm); font-family: monospace; flex-shrink: 0; }
    .unread-badge { background: var(--blue); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; flex-shrink: 0; }
    .sidebar-foot { border-top: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--tm); cursor: pointer; font-size: 11px; padding: 4px 10px; border-radius: 4px; }
    .logout-btn:hover { color: var(--red); border-color: var(--red); }

    /*  Main panel  */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-header { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--card); display: flex; align-items: center; gap: 10px; }
    .chat-header h3 { color: var(--tb); font-size: 15px; font-weight: 600; }
    .chat-header .ws-status { font-size: 10px; font-family: monospace; padding: 2px 8px; border-radius: 4px; margin-left: auto; flex-shrink: 0; }
    .ws-status.connected    { background: rgba(63,185,80,.12);  color: var(--green); }
    .ws-status.connecting   { background: rgba(210,153,34,.12); color: var(--yellow); }
    .ws-status.disconnected { background: rgba(248,81,73,.12);  color: var(--red); }

    /*  Messages  */
    .messages { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--tm); font-size: 13px; text-align: center; gap: 8px; }
    .empty-state .big { font-size: 32px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.own { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: var(--blue); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .msg.own .avatar { background: var(--purple); }
    .bubble-wrap { max-width: 68%; display: flex; flex-direction: column; gap: 2px; }
    .msg.own .bubble-wrap { align-items: flex-end; }
    .sender-name { font-size: 11px; color: var(--tm); margin-bottom: 1px; }
    .bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.6; background: var(--card); color: var(--t); word-break: break-word; }
    .msg.own .bubble { background: #1f4b6e; color: var(--tb); }
    .ts { font-size: 10px; color: var(--tm); display: flex; align-items: center; gap: 4px; }
    .read-receipt { font-size: 10px; color: var(--tm); line-height: 1; flex-shrink: 0; }
    .read-receipt.read { color: var(--blue); font-weight: 600; }
    .system-msg { text-align: center; font-size: 11px; color: var(--tm); font-family: monospace; padding: 4px 0; }

    /*  Invite message  */
    .invite-bubble { display: flex; gap: 10px; align-items: flex-start; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: rgba(88,166,255,.06); max-width: 320px; }
    .invite-icon { font-size: 20px; flex-shrink: 0; }
    .invite-content { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .invite-label { font-size: 10px; color: var(--tm); text-transform: uppercase; letter-spacing: .5px; }
    .invite-group-name { font-size: 14px; font-weight: 600; color: var(--tb); }
    .invite-actions { display: flex; gap: 6px; margin-top: 6px; }
    .btn-invite-join    { background: var(--green); color: #fff; border: none; border-radius: 5px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-invite-decline { background: var(--border); color: var(--t); border: none; border-radius: 5px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-invite-join:hover    { opacity: .85; }
    .btn-invite-decline:hover { opacity: .75; }
    .invite-status-text { font-size: 12px; margin-top: 4px; }
    .invite-status-text.accepted { color: var(--green); }
    .invite-status-text.declined { color: var(--tm); }

    /*  Composer  */
    .composer { padding: 12px 18px; border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 10px; align-items: flex-end; }
    .composer textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--tb); font-size: 13px; padding: 8px 12px; resize: none; outline: none; font-family: inherit; max-height: 120px; min-height: 38px; line-height: 1.5; transition: border-color .15s; }
    .composer textarea:focus { border-color: var(--blue); }
    .send-btn { background: var(--green); color: #fff; border: none; border-radius: 8px; width: 38px; height: 38px; cursor: pointer; font-size: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity .15s; }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { opacity: .85; }

    /*  Modals  */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 100%; max-width: 400px; }
    .modal-wide { max-width: 520px; }
    .modal h3 { color: var(--tb); font-size: 15px; margin-bottom: 16px; font-weight: 600; }
    .modal label { display: block; font-size: 12px; color: var(--tm); margin-bottom: 4px; margin-top: 12px; }
    .modal input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--tb); font-size: 13px; padding: 8px 10px; outline: none; }
    .modal input[type="text"]:focus { border-color: var(--blue); }
    .modal-btns { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
    .modal-btns button { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
    .btn-cancel  { background: var(--border); color: var(--t); }
    .btn-confirm { background: var(--green); color: #fff; }
    .modal-error { color: var(--red); font-size: 11px; margin-top: 8px; min-height: 16px; }

    /*  Group creation empty state  */
    .no-members-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px 20px; color: var(--tm); text-align: center; }
    .no-members-state .big { font-size: 40px; }
    .no-members-state p { font-size: 13px; line-height: 1.6; }
    .btn-add-members { background: var(--blue); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-add-members:hover { opacity: .85; }

    /*  Manage room modal  */
    .manage-tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 14px; }
    .mtab { flex: 1; padding: 7px 4px; background: transparent; color: var(--tm); border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all .15s; }
    .mtab.active { background: var(--blue); color: #fff; }
    .mtab-content { max-height: 300px; overflow-y: auto; }
    .mtab-content.hidden { display: none; }
    .manage-member-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid var(--border); gap: 8px; }
    .manage-member-row:last-child { border-bottom: none; }
    .mm-user { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .mm-name { font-size: 13px; color: var(--tb); font-weight: 500; }
    .mm-handle { font-size: 11px; color: var(--tm); }
    .admin-badge { font-size: 10px; background: rgba(210,153,34,.2); color: var(--yellow); padding: 1px 6px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
    .mm-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-sm { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }
    .btn-promote      { background: rgba(63,185,80,.15);  color: var(--green); }
    .btn-demote       { background: rgba(210,153,34,.15); color: var(--yellow); }
    .btn-remove-member{ background: rgba(248,81,73,.15);  color: var(--red); }
    .btn-invite-send  { background: rgba(88,166,255,.15); color: var(--blue); }
    .manage-invite-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid var(--border); }
    .manage-invite-row:last-child { border-bottom: none; }
    .invite-pill { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .invite-pill.pending  { background: rgba(210,153,34,.2); color: var(--yellow); }
    .invite-pill.accepted { background: rgba(63,185,80,.2);  color: var(--green); }
    .invite-pill.declined { background: rgba(248,81,73,.2);  color: var(--red); }
    .mm-empty { font-size: 12px; color: var(--tm); padding: 12px 0; text-align: center; }
    .add-member-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 4px; border-bottom: 1px solid var(--border); }
    .add-member-row:last-child { border-bottom: none; }

    /*  New-messages scroll indicator  */
    .main { position: relative; }
    .new-msg-bar { position: absolute; bottom: 72px; left: 50%; transform: translateX(-50%);
      background: var(--blue); color: #fff; border: none; border-radius: 20px;
      padding: 6px 18px; font-size: 12px; font-weight: 600; cursor: pointer;
      z-index: 10; display: none; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
    .new-msg-bar:hover { opacity: .9; }

    /*  Reply UI  */
    .reply-bar { background: var(--card); border-top: 1px solid var(--border); padding: 6px 18px; display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 40px; }
    .reply-bar-inner { display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1; }
    .reply-bar-label { font-size: 11px; color: var(--blue); font-weight: 600; }
    .reply-bar-preview { font-size: 11px; color: var(--tm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reply-bar-cancel { background: none; border: none; color: var(--tm); cursor: pointer; font-size: 14px; padding: 2px 4px; flex-shrink: 0; border-radius: 4px; }
    .reply-bar-cancel:hover { color: var(--tb); background: var(--border); }
    .reply-quote { border-left: 3px solid var(--blue); background: rgba(88,166,255,.06); border-radius: 0 6px 6px 0; padding: 4px 10px; margin-bottom: 4px; cursor: pointer; max-width: 100%; }
    .reply-quote:hover { background: rgba(88,166,255,.12); }
    .reply-quote-name { font-size: 11px; color: var(--blue); font-weight: 600; display: block; }
    .reply-quote-text { font-size: 11px; color: var(--tm); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reply-btn { background: none; border: none; color: var(--tm); cursor: pointer; font-size: 13px; padding: 3px 6px; border-radius: 4px; opacity: 0; transition: opacity .1s; flex-shrink: 0; align-self: center; }
    .msg:hover .reply-btn { opacity: 1; }
    .reply-btn:hover { color: var(--blue); background: rgba(88,166,255,.1); }
    .msg-highlight { animation: highlight-pulse .4s ease 2; }
    @keyframes highlight-pulse { 0%,100% { background: transparent; } 50% { background: rgba(88,166,255,.15); border-radius: 8px; } }

    /*  No room selected  */
    .no-room { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--tm); gap: 10px; }
    .no-room .big { font-size: 48px; }
    .no-room p { font-size: 13px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="layout">
  <!--  Sidebar  -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <h2>NexChat</h2>
      <span class="me" id="me-label">…</span>
    </div>

    <div class="sidebar-section">
      <span>Groups</span>
      <button class="icon-btn" title="New group room" onclick="openNewGroup()">+</button>
    </div>
    <div class="room-list" id="group-list"></div>

    <div class="sidebar-section">
      <span>Direct Messages</span>
      <button class="icon-btn" title="New DM" onclick="openNewDM()">+</button>
    </div>
    <div class="room-list" id="dm-list"></div>

    <div class="sidebar-foot">
      <span style="font-size:10px;color:var(--tm);font-family:monospace">● connected</span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </aside>

  <!--  Main  -->
  <main class="main" id="main-panel">
    <div class="no-room">
      <div class="big">💬</div>
      <p>Select a room or start a new conversation.</p>
    </div>
  </main>
</div>

<!--  New Group Modal  -->
<div class="modal-overlay" id="modal-group">
  <div class="modal">
    <h3>New Group Room</h3>
    <label>Room name</label>
    <input id="ng-name" type="text" placeholder="e.g. Engineering"
      onkeydown="if(event.key==='Enter'){event.preventDefault();createGroup();}" />
    <div class="modal-error" id="ng-error"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-group')">Cancel</button>
      <button class="btn-confirm" onclick="createGroup()">Create</button>
    </div>
  </div>
</div>

<!--  New DM Modal  -->
<div class="modal-overlay" id="modal-dm">
  <div class="modal">
    <h3>New Direct Message</h3>
    <label>Username</label>
    <input id="dm-username" type="text" placeholder="alice" />
    <div class="modal-error" id="dm-error"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-dm')">Cancel</button>
      <button class="btn-confirm" onclick="createDM()">Start DM</button>
    </div>
  </div>
</div>

<!--  Manage Room Modal  -->
<div class="modal-overlay" id="modal-manage">
  <div class="modal modal-wide">
    <h3 id="manage-title">Manage Room</h3>

    <div class="manage-tabs">
      <button class="mtab active" onclick="showManageTab('members')">Members</button>
      <button class="mtab"        onclick="showManageTab('invites')">Invites</button>
      <button class="mtab"        onclick="showManageTab('add')">Add Member</button>
    </div>

    <!-- Members tab -->
    <div class="mtab-content" id="mtab-members">
      <div id="manage-members-list"></div>
    </div>

    <!-- Invites tab -->
    <div class="mtab-content hidden" id="mtab-invites">
      <div id="manage-invites-list"></div>
    </div>

    <!-- Add member tab -->
    <div class="mtab-content hidden" id="mtab-add">
      <div style="margin-bottom:8px">
        <input id="add-member-search" type="text" placeholder="Search username…"
          oninput="searchAddMember()" autocomplete="off"
          style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--tb);font-size:13px;padding:8px 10px;outline:none;" />
      </div>
      <div id="add-member-results"></div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-manage')">Close</button>
    </div>
  </div>
</div>

<script src="{% static 'nexchat.js' %}"></script>
</body>
</html>
